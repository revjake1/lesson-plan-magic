name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: python -m pip install -r plugin/skills/lesson-planner/scripts/requirements-dev.txt

      - name: Run tests
        run: python -m pytest plugin/tests

      - name: Build plugin archive
        run: python scripts/build_plugin.py --output dist/jakes-lesson-plan-magic.plugin

      - name: Smoke-test packaged plugin
        run: python scripts/smoke_packaged_plugin.py dist/jakes-lesson-plan-magic.plugin

      - name: Check dependency graph
        run: python -m pip check
