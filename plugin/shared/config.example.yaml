# Example config.yaml for Jake's Lesson Plan Magic
# This is a reference file. The real config is created during first-run onboarding
# and lives at ~/Documents/Lesson Plan Magic/config.yaml
#
# This example shows TWO common scenarios:
#   1. A high-school teacher with two preps (AP Chem + regular Chem)
#   2. An elementary self-contained 3rd grade teacher
#
# To try a specific scenario, copy one of the two subjects blocks.

version: "0.3.1"

teacher:
  name: "Jane Smith"
  experience_level: veteran
  district: "Anytown USD"
  state: "OH"
  school: "Central High School"

subjects:
  # ============================================================
  # Scenario 1: HS Chemistry teacher, two preps
  # ============================================================
  - id: chem
    name: "Chemistry I"
    subject_type: departmentalized
    standards:
      - path: "standards/oh-nglss-chem.pdf"
    template:
      path: "templates/weekly-chem.docx"
      mapping_verified: true
    schedule:
      type: block
      period_length_minutes: 90
      days: [M, T, W, R, F]
      periods_per_day: 2
      rotation: null
    frameworks: ["5e", "gradual-release"]
    custom_framework_path: null
    differentiation:
      tiers: [novice, on-level, advanced]
      populations: [ELL, SPED_IEP]
    voice_profile: "past-plans/chem/voice-profile.md"
    past_plans_dir: "past-plans/chem/"
    pacing:
      scope_and_sequence: "scope-and-sequence/chem-2025-26.md"
      last_planned_week_end: "2026-04-18"
      current_unit: "Thermochemistry"

  - id: ap-chem
    name: "AP Chemistry"
    subject_type: departmentalized
    standards:
      - path: "standards/college-board-ap-chem.pdf"
    template:
      path: "templates/weekly-ap-chem.docx"
      mapping_verified: true
    schedule:
      type: block
      period_length_minutes: 90
      days: [M, T, W, R, F]
      periods_per_day: 1
      rotation: null
    frameworks: ["5e", "gradual-release"]
    differentiation:
      tiers: [on-level, advanced]    # no novice tier for AP
      populations: [GIFTED]
    voice_profile: "past-plans/chem/voice-profile.md"   # shared voice (same teacher)
    past_plans_dir: "past-plans/ap-chem/"
    pacing:
      scope_and_sequence: "scope-and-sequence/ap-chem-2025-26.md"
      last_planned_week_end: "2026-04-18"
      current_unit: "Equilibrium"

  # ============================================================
  # Scenario 2: Elementary self-contained 3rd grade
  # (Uncomment to use; comment out HS subjects above)
  # ============================================================
  # - id: grade-3-self-contained
  #   name: "3rd Grade"
