defaults:
  output_formats: [docx]  # v0.3.1 ships docx only; pdf is on the roadmap. classroom-artifacts handles pptx/docx separately.
  research_depth: verified
  compliance_mode: soft-warn
  voice_match_level: calibrated
  bonus_artifacts_prompt: true
  calendar_path: "calendar/2025-26.ics"  # or "calendar/2025-26.pdf" for text-based district calendars

privacy:
  student_data: never          # hard invariant; do not change
  pii_scan_before_write: true
  retention_days: 365
  telemetry: off               # hard invariant; do not change
